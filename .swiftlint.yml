# WeatherNow — SwiftLint 設定

included:
  - WeatherNow
  - Packages

excluded:
  - Tools
  - .build
  - DerivedData
  - Packages/**/.build

# デフォルトルールのうち個人開発では過剰なものを無効化
disabled_rules:
  - trailing_whitespace    # SwiftFormat に委譲
  - trailing_comma         # SwiftFormat --commas always と競合
  - todo                   # 学習プロジェクトのため許容

opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - modifier_order

# 閾値調整
line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100

type_name:
  min_length: 2
  max_length: 60

identifier_name:
  min_length: 1
  max_length: 50
